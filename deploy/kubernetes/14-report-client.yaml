apiVersion: v1
kind: Service
metadata:
  name: report-client
  namespace: containgo
spec:
  selector:
    app.kubernetes.io/name: report-client
  ports:
  - name: https-control
    port: 8072
    targetPort: https-control
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: report-client
  namespace: containgo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: report-client
  template:
    metadata:
      labels:
        app.kubernetes.io/name: report-client
        app.kubernetes.io/part-of: containgo
        containgo.io/spiffe: 'true'
    spec:
      serviceAccountName: report-client
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 15
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: report-client
        image: containgo/report-client:dev
        imagePullPolicy: IfNotPresent
        env:
        - name: SPIFFE_ENDPOINT_SOCKET
          value: unix:///spiffe-workload-api/spire-agent.sock
        - name: CONTAINGO_GATEWAY_URL
          value: https://api-gateway.containgo.svc.cluster.local:8443
        - name: CONTAINGO_REPORT_CONTROL_ADDRESS
          value: 0.0.0.0:8072
        - name: CONTAINGO_REPORT_INITIAL_MODE
          value: normal
        - name: CONTAINGO_REPORT_NORMAL_INTERVAL
          value: 5s
        - name: CONTAINGO_REPORT_ATTACK_INTERVAL
          value: 1s
        - name: CONTAINGO_REPORT_RAPID_INTERVAL
          value: 50ms
        - name: CONTAINGO_REPORT_RAPID_BURST
          value: '35'
        - name: CONTAINGO_REPORT_REQUEST_TIMEOUT
          value: 5s
        ports:
        - name: https-control
          containerPort: 8072
        resources:
          requests:
            cpu: 15m
            memory: 40Mi
          limits:
            cpu: 200m
            memory: 128Mi
        startupProbe:
          httpGet:
            path: /healthz
            port: https-control
            scheme: HTTPS
          periodSeconds: 2
          timeoutSeconds: 2
          failureThreshold: 30
        livenessProbe:
          httpGet:
            path: /healthz
            port: https-control
            scheme: HTTPS
          periodSeconds: 10
          timeoutSeconds: 2
        readinessProbe:
          httpGet:
            path: /healthz
            port: https-control
            scheme: HTTPS
          periodSeconds: 5
          timeoutSeconds: 2
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: spiffe-workload-api
          mountPath: /spiffe-workload-api
          readOnly: true
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: spiffe-workload-api
        csi:
          driver: csi.spiffe.io
          readOnly: true
      - name: tmp
        emptyDir:
          sizeLimit: 32Mi
