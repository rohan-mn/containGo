apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: containgo
spec:
  selector:
    app.kubernetes.io/name: dashboard
  ports:
  - name: http
    port: 8060
    targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: containgo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dashboard
        app.kubernetes.io/part-of: containgo
        containgo.io/spiffe: 'true'
    spec:
      serviceAccountName: dashboard
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 15
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: dashboard
        image: containgo/dashboard:dev
        imagePullPolicy: IfNotPresent
        env:
        - name: SPIFFE_ENDPOINT_SOCKET
          value: unix:///spiffe-workload-api/spire-agent.sock
        - name: CONTAINGO_DASHBOARD_ADDRESS
          value: 0.0.0.0:8060
        - name: CONTAINGO_CONTROL_PLANE_URL
          value: https://control-plane.containgo.svc.cluster.local:8090
        - name: CONTAINGO_REPORT_CLIENT_CONTROL_URL
          value: https://report-client.containgo.svc.cluster.local:8072
        - name: CONTAINGO_DEMO_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: containgo-demo-api
              key: token
        - name: CONTAINGO_DASHBOARD_API_TIMEOUT
          value: 5s
        - name: CONTAINGO_DASHBOARD_SECURE_COOKIE
          value: 'false'
        ports:
        - name: http
          containerPort: 8060
        resources:
          requests:
            cpu: 20m
            memory: 48Mi
          limits:
            cpu: 200m
            memory: 160Mi
        startupProbe:
          httpGet:
            path: /healthz
            port: http
          periodSeconds: 2
          timeoutSeconds: 2
          failureThreshold: 30
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          periodSeconds: 10
          timeoutSeconds: 2
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          periodSeconds: 5
          timeoutSeconds: 2
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: spiffe-workload-api
          mountPath: /spiffe-workload-api
          readOnly: true
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: spiffe-workload-api
        csi:
          driver: csi.spiffe.io
          readOnly: true
      - name: tmp
        emptyDir:
          sizeLimit: 64Mi
