apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: containgo
spec:
  selector:
    app.kubernetes.io/name: control-plane
  ports:
  - name: https
    port: 8090
    targetPort: https
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: containgo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: control-plane
        app.kubernetes.io/part-of: containgo
        containgo.io/spiffe: 'true'
    spec:
      serviceAccountName: control-plane
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
      containers:
      - name: control-plane
        image: containgo/control-plane:dev
        imagePullPolicy: IfNotPresent
        env:
        - name: SPIFFE_ENDPOINT_SOCKET
          value: unix:///spiffe-workload-api/spire-agent.sock
        - name: CONTAINGO_CONTROL_PLANE_ADDRESS
          value: 0.0.0.0:8090
        - name: CONTAINGO_DATABASE_PATH
          value: /var/lib/containgo/containgo.db
        - name: CONTAINGO_ENFORCEMENT_MODE
          value: gateway
        - name: CONTAINGO_GATEWAY_URL
          value: https://api-gateway.containgo.svc.cluster.local:8443
        ports:
        - name: https
          containerPort: 8090
        resources:
          requests:
            cpu: 40m
            memory: 64Mi
          limits:
            cpu: 400m
            memory: 256Mi
        startupProbe:
          httpGet:
            path: /healthz
            port: https
            scheme: HTTPS
          periodSeconds: 2
          timeoutSeconds: 2
          failureThreshold: 60
        livenessProbe:
          httpGet:
            path: /healthz
            port: https
            scheme: HTTPS
          periodSeconds: 10
          timeoutSeconds: 2
        readinessProbe:
          httpGet:
            path: /readyz
            port: https
            scheme: HTTPS
          periodSeconds: 5
          timeoutSeconds: 2
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: spiffe-workload-api
          mountPath: /spiffe-workload-api
          readOnly: true
        - name: sqlite
          mountPath: /var/lib/containgo
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: spiffe-workload-api
        csi:
          driver: csi.spiffe.io
          readOnly: true
      - name: sqlite
        persistentVolumeClaim:
          claimName: containgo-sqlite
      - name: tmp
        emptyDir:
          sizeLimit: 64Mi
  strategy:
    type: Recreate
