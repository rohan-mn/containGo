apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: containgo
spec:
  selector:
    app.kubernetes.io/name: api-gateway
  ports:
  - name: https
    port: 8443
    targetPort: https
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: containgo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/part-of: containgo
        containgo.io/spiffe: 'true'
    spec:
      serviceAccountName: api-gateway
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 20
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: api-gateway
        image: containgo/api-gateway:dev
        imagePullPolicy: IfNotPresent
        env:
        - name: SPIFFE_ENDPOINT_SOCKET
          value: unix:///spiffe-workload-api/spire-agent.sock
        - name: CONTAINGO_GATEWAY_ADDRESS
          value: 0.0.0.0:8443
        - name: CONTAINGO_OPA_URL
          value: http://127.0.0.1:8181
        - name: CONTAINGO_CONTROL_PLANE_URL
          value: https://control-plane.containgo.svc.cluster.local:8090
        - name: CONTAINGO_PROTECTED_API_URL
          value: https://protected-api.containgo.svc.cluster.local:8080
        ports:
        - name: https
          containerPort: 8443
        resources:
          requests:
            cpu: 40m
            memory: 64Mi
          limits:
            cpu: 400m
            memory: 256Mi
        startupProbe:
          httpGet:
            path: /healthz
            port: https
            scheme: HTTPS
          periodSeconds: 2
          timeoutSeconds: 2
          failureThreshold: 60
        livenessProbe:
          httpGet:
            path: /healthz
            port: https
            scheme: HTTPS
          periodSeconds: 10
          timeoutSeconds: 2
        readinessProbe:
          httpGet:
            path: /healthz
            port: https
            scheme: HTTPS
          periodSeconds: 5
          timeoutSeconds: 2
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: spiffe-workload-api
          mountPath: /spiffe-workload-api
          readOnly: true
        - name: tmp
          mountPath: /tmp
      - name: opa
        image: openpolicyagent/opa:1.17.1-static
        imagePullPolicy: IfNotPresent
        args:
        - run
        - --server
        - --addr=0.0.0.0:8181
        - --log-format=json
        - --set=decision_logs.console=false
        - /policy/containgo.rego
        resources:
          requests:
            cpu: 25m
            memory: 48Mi
          limits:
            cpu: 300m
            memory: 192Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8181
          periodSeconds: 10
          timeoutSeconds: 2
        readinessProbe:
          httpGet:
            path: /health
            port: 8181
          periodSeconds: 5
          timeoutSeconds: 2
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
        volumeMounts:
        - name: opa-policy
          mountPath: /policy
          readOnly: true
        - name: opa-tmp
          mountPath: /tmp
      volumes:
      - name: spiffe-workload-api
        csi:
          driver: csi.spiffe.io
          readOnly: true
      - name: opa-policy
        configMap:
          name: containgo-opa-policy
      - name: opa-tmp
        emptyDir:
          sizeLimit: 64Mi
      - name: tmp
        emptyDir:
          sizeLimit: 64Mi
