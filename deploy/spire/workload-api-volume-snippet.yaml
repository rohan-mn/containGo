# Reference snippet for every ContainGo Kubernetes Deployment added in
# Phase 10. Replace <component> with the container and ServiceAccount name.
#
# The SPIRE CSI driver exposes the Workload API socket to the pod. The Go
# binaries read SPIFFE_ENDPOINT_SOCKET and never load identity certificates
# from files.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: <component>
  namespace: containgo
spec:
  template:
    metadata:
      labels:
        containgo.io/spiffe: "true"
    spec:
      serviceAccountName: <component>
      containers:
        - name: <component>
          env:
            - name: SPIFFE_ENDPOINT_SOCKET
              value: unix:///spiffe-workload-api/spire-agent.sock
          volumeMounts:
            - name: spiffe-workload-api
              mountPath: /spiffe-workload-api
              readOnly: true
      volumes:
        - name: spiffe-workload-api
          csi:
            driver: csi.spiffe.io
            readOnly: true
