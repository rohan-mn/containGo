apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-agent
  namespace: spire
data:
  agent.conf: |
    agent {
      data_dir = "/run/spire/data"
      log_level = "INFO"
      server_address = "spire-server.spire.svc"
      server_port = "8081"
      socket_path = "/run/spire/sockets/agent.sock"
      trust_bundle_path = "/run/spire/bundle/root-ca.crt"
      trust_domain = "containgo.local"
    }

    plugins {
      NodeAttestor "join_token" {
        plugin_data {}
      }
      KeyManager "disk" {
        plugin_data {
          directory = "/run/spire/data"
        }
      }
      WorkloadAttestor "unix" {
        plugin_data {}
      }
    }

    health_checks {
      listener_enabled = true
      bind_address = "0.0.0.0"
      bind_port = "8082"
      live_path = "/live"
      ready_path = "/ready"
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: spire-agent
  namespace: spire
spec:
  selector:
    matchLabels:
      app: spire-agent
  template:
    metadata:
      labels:
        app: spire-agent
    spec:
      hostPID: true
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: spire-agent
          image: ghcr.io/spiffe/spire-agent:1.15.1
          args:
            - -config
            - /run/spire/config/agent.conf
            - -joinToken
            - $(JOIN_TOKEN)
          env:
            - name: JOIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: spire-agent-join-token
                  key: token
          ports:
            - name: health
              containerPort: 8082
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            initialDelaySeconds: 3
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /live
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            privileged: true
          volumeMounts:
            - name: config
              mountPath: /run/spire/config
              readOnly: true
            - name: bundle
              mountPath: /run/spire/bundle
              readOnly: true
            - name: data
              mountPath: /run/spire/data
            - name: socket
              mountPath: /run/spire/sockets
      volumes:
        - name: config
          configMap:
            name: spire-agent
        - name: bundle
          secret:
            secretName: spire-root-ca
            items:
              - key: root-ca.crt
                path: root-ca.crt
        - name: data
          hostPath:
            path: /run/spire/data
            type: DirectoryOrCreate
        - name: socket
          hostPath:
            path: /run/spire/sockets
            type: DirectoryOrCreate
