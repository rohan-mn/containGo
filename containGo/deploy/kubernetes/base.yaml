apiVersion: v1
kind: Namespace
metadata:
  name: containgo
  labels:
    app.kubernetes.io/part-of: containgo
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway
  namespace: containgo
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: control-plane
  namespace: containgo
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard
  namespace: containgo
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: order-client
  namespace: containgo
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: report-client
  namespace: containgo
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: protected-api
  namespace: containgo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: spiffe-helper-config
  namespace: containgo
data:
  helper.conf: |
    agent_address = "/run/spire/sockets/agent.sock"
    cert_dir = "/run/spiffe/certs"
    daemon_mode = true
    svid_file_name = "svid.pem"
    svid_key_file_name = "svid_key.pem"
    svid_bundle_file_name = "bundle.pem"
    add_intermediates_to_bundle = true
    cert_file_mode = 0644
    key_file_mode = 0600

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: containgo-opa-policy
  namespace: containgo
data:
  containgo.rego: |
    package containgo.authz
    
    import rego.v1
    
    default allow := false
    
    allow if {
      not input.quarantined
      input.workload == "order-client"
      input.spiffe_id == "spiffe://containgo.local/ns/containgo/sa/order-client"
      order_route
    }
    
    allow if {
      not input.quarantined
      input.workload == "report-client"
      input.spiffe_id == "spiffe://containgo.local/ns/containgo/sa/report-client"
      report_route
    }
    
    order_route if {
      input.method == "GET"
      input.path == "/api/orders"
    }
    
    order_route if {
      input.method == "POST"
      input.path == "/api/orders"
    }
    
    order_route if {
      input.method == "PUT"
      input.path == "/api/orders/ORD-1001"
    }
    
    order_route if {
      input.method == "DELETE"
      input.path == "/api/orders/ORD-1001"
    }
    
    report_route if {
      input.method == "GET"
      input.path == "/api/reports"
    }
    
    report_route if {
      input.method == "POST"
      input.path == "/api/reports/generate"
    }
    
    report_route if {
      input.method == "GET"
      input.path == "/api/customers"
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: control-plane-data
  namespace: containgo
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: containgo
  labels:
    app: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
        containgo.io/workload: control-plane
    spec:
      serviceAccountName: control-plane
      securityContext:
        runAsNonRoot: true
        runAsUser: 10002
        runAsGroup: 10002
        fsGroup: 10002
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: control-plane
          image: containgo:local
          imagePullPolicy: Never
          command: ["/app/control-plane"]
          ports:
            - name: app
              containerPort: 8443
            - name: health
              containerPort: 8081
          env:
            - name: SPIFFE_ID
              value: "spiffe://containgo.local/ns/containgo/sa/control-plane"
            - name: STATE_FILE
              value: "/data/state.json"
            - name: RISK_THRESHOLD
              value: "100"
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: certs
              mountPath: /run/spiffe/certs
            - name: data
              mountPath: /data
        - name: spiffe-helper
          image: containgo-spiffe-helper:local
          imagePullPolicy: Never
          args: ["-config", "/etc/spiffe-helper/helper.conf"]
          securityContext:
            runAsUser: 10002
            runAsGroup: 10002
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: agent-socket
              mountPath: /run/spire/sockets
              readOnly: true
            - name: certs
              mountPath: /run/spiffe/certs
            - name: helper-config
              mountPath: /etc/spiffe-helper
              readOnly: true

      volumes:
        - name: agent-socket
          hostPath:
            path: /run/spire/sockets
            type: Directory
        - name: certs
          emptyDir: {}
        - name: helper-config
          configMap:
            name: spiffe-helper-config
        - name: data
          persistentVolumeClaim:
            claimName: control-plane-data
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: containgo
spec:
  selector: {app: control-plane}
  ports:
    - name: mtls
      port: 8443
      targetPort: app
---
