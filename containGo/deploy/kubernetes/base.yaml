apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: containgo
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        containgo.io/workload: api-gateway
    spec:
      serviceAccountName: api-gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: api-gateway
          image: containgo:local
          imagePullPolicy: Never
          command: ["/app/api-gateway"]
          ports:
            - name: app
              containerPort: 8443
            - name: health
              containerPort: 8081
          env:
            - name: SPIFFE_ID
              value: "spiffe://containgo.local/ns/containgo/sa/api-gateway"
            - name: OPA_URL
              value: "http://127.0.0.1:8181/v1/data/containgo/authz/allow"
            - name: PROTECTED_API_URL
              value: "https://protected-api:8443"
            - name: CONTROL_PLANE_URL
              value: "https://control-plane:8443"
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: certs
              mountPath: /run/spiffe/certs
        - name: spiffe-helper
          image: containgo-spiffe-helper:local
          imagePullPolicy: Never
          args: ["-config", "/etc/spiffe-helper/helper.conf"]
          securityContext:
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: agent-socket
              mountPath: /run/spire/sockets
              readOnly: true
            - name: certs
              mountPath: /run/spiffe/certs
            - name: helper-config
              mountPath: /etc/spiffe-helper
              readOnly: true

        - name: opa
          image: openpolicyagent/opa:1.17.1-static
          imagePullPolicy: IfNotPresent
          args: ["run", "--server", "--addr=127.0.0.1:8181", "/policy/containgo.rego"]
          ports:
            - name: opa
              containerPort: 8181
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: opa-policy
              mountPath: /policy
              readOnly: true
      volumes:
        - name: agent-socket
          hostPath:
            path: /run/spire/sockets
            type: Directory
        - name: certs
          emptyDir: {}
        - name: helper-config
          configMap:
            name: spiffe-helper-config

        - name: opa-policy
          configMap:
            name: containgo-opa-policy
---
