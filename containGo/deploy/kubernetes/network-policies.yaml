apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: containgo
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-and-health
  namespace: containgo
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - ports:
        - protocol: TCP
          port: 8081
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dashboard-access
  namespace: containgo
spec:
  podSelector:
    matchLabels:
      app: dashboard
  policyTypes: [Ingress, Egress]
  ingress:
    - ports:
        - protocol: TCP
          port: 8060
  egress:
    - to:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [order-client, report-client]
      ports:
        - protocol: TCP
          port: 8444
    - to:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [api-gateway, protected-api, control-plane]
      ports:
        - protocol: TCP
          port: 8443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: business-clients
  namespace: containgo
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [order-client, report-client]
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: dashboard
      ports:
        - protocol: TCP
          port: 8444
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - protocol: TCP
          port: 8443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway
  namespace: containgo
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [order-client, report-client, dashboard]
      ports:
        - protocol: TCP
          port: 8443
  egress:
    - to:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [protected-api, control-plane]
      ports:
        - protocol: TCP
          port: 8443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: protected-api
  namespace: containgo
spec:
  podSelector:
    matchLabels:
      app: protected-api
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [api-gateway, dashboard]
      ports:
        - protocol: TCP
          port: 8443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: control-plane
  namespace: containgo
spec:
  podSelector:
    matchLabels:
      app: control-plane
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [api-gateway, dashboard]
      ports:
        - protocol: TCP
          port: 8443
